name: Feature Request
description: Suggest a new feature or improvement for card-mod
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What need is not covered today? What are you trying to achieve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or behaviour you would like.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you have tried.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Example YAML, screenshots, links…
      render: YAML
