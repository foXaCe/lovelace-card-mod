repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.4
    hooks:
      - id: prettier
        # Format only sources/config; the bundled output and lockfile are excluded.
        exclude: "^(card-mod\\.js|package-lock\\.json|test/)"
