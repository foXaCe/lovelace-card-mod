# pre-commit.ci: run as a check only, do not auto-push fix commits.
ci:
  autofix_prs: false
  autoupdate_schedule: quarterly

# Build artifact and lockfile must never be touched by hooks.
exclude: '^(card-mod\.js|package-lock\.json)$'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ["--unsafe"] # allow Home Assistant custom YAML tags in test/
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.4
    hooks:
      - id: prettier
        # Skip HA dashboard test fixtures (kept as authored).
        exclude: "^test/"
